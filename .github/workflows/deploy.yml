name: CI - Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# === CONFIGURAZIONE CONSIGLIATA MAGGIO 2026 ===
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Forza Node 24 come richiesto da GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js 22 (LTS Raccomandato)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm run typecheck

      - name: Build Application
        run: pnpm run build
        env:
          VITE_FIREBASE_ENABLED: ${{ secrets.VITE_FIREBASE_ENABLED || 'false' }}

      - name: ✅ Success
        if: success()
        run: echo "🎉 Build completata con successo su Node 22 (con runtime Node 24)"

      - name: ❌ Failed
        if: failure()
        run: echo "❌ Build fallita - controlla i log"
