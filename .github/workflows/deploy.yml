name: CI - Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies (Lockfile Fix)
        run: pnpm install   # Senza --frozen-lockfile per aggiornare automaticamente

      - name: Type Check
        run: pnpm run typecheck

      - name: Build Application
        run: pnpm run build
        env:
          VITE_FIREBASE_ENABLED: ${{ secrets.VITE_FIREBASE_ENABLED || 'false' }}

      - name: ✅ Build Status
        if: success()
        run: echo "🎉 Build completata con successo!"

      - name: ❌ Build Failed
        if: failure()
        run: echo "❌ Build fallita - controlla i log sopra"
