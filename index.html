<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="authDiv" class="app">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password">

  <button id="login">Login</button>
  <button id="google">Google</button>
</div>

<div id="appDiv" class="app" style="display:none;">

  <h2>Dashboard Preventivi</h2>

  <select id="tipo">
    <option>imbiancatura</option>
    <option>piastrelle</option>
    <option>bagno</option>
  </select>

  <input id="mq" placeholder="Inserisci mq">
  <select id="qualita">
    <option>bassa</option>
    <option>media</option>
    <option>alta</option>
  </select>

  <select id="citta">
    <option>milano</option>
    <option>roma</option>
    <option>napoli</option>
  </select>

  <button id="calcola">Calcola</button>
  <button id="save">Salva Preventivo</button>
  <button id="pdf">Export PDF</button>
  <button id="logout">Logout</button>

  <h3 id="output"></h3>

  <canvas id="chart"></canvas>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
