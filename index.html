<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="authDiv" class="app">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password">

  <button id="login">Login</button>
  <button id="google">Google</button>
</div>

<div id="appDiv" class="app" style="display:none;">

  <h2>Dashboard Preventivi</h2>

  <label for="tipo" style="display: block; margin-top: 15px; font-size: 12px; color: #9ca3af;">Tipo di Lavoro</label>
  <select id="tipo" required>
    <option value="">-- Seleziona un tipo --</option>
    <option value="imbiancatura">Imbiancatura</option>
    <option value="piastrelle">Piastrelle</option>
    <option value="bagno">Ristrutturazione Bagno</option>
  </select>

  <label for="mq" style="display: block; margin-top: 15px; font-size: 12px; color: #9ca3af;">Metri Quadri</label>
  <input id="mq" type="number" placeholder="Inserisci mq" min="1" step="0.5" required>
  
  <label for="qualita" style="display: block; margin-top: 15px; font-size: 12px; color: #9ca3af;">Qualita</label>
  <select id="qualita" required>
    <option value="">-- Seleziona qualita --</option>
    <option value="bassa">Bassa</option>
    <option value="media">Media</option>
    <option value="alta">Alta</option>
  </select>

  <label for="citta" style="display: block; margin-top: 15px; font-size: 12px; color: #9ca3af;">Citta</label>
  <select id="citta" required>
    <option value="">-- Seleziona citta --</option>
    <option value="milano">Milano</option>
    <option value="roma">Roma</option>
    <option value="napoli">Napoli</option>
  </select>

  <button id="calcola">Calcola</button>
  <button id="save">Salva Preventivo</button>
  <button id="pdf">Export PDF</button>
  <button id="logout">Logout</button>

  <h3 id="output"></h3>

  <canvas id="chart"></canvas>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
